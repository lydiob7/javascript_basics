<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clases en JavaScript (POO)</title>
    <script src="main.js" type="text/javascript" defer></script>
    <link href="index.css" rel="stylesheet" />
  </head>
  <body>
    <div>
      <h1>Clases en JavaScript (POO)</h1>
      <div id="personajes"></div>
      <dialog id="personaje-dialog">
        <div class="dialog-inner">
          <div class="personaje-container"></div>
          <button
            class="close-dialog-btn"
            command="close"
            commandfor="personaje-dialog"
          >
            Cerrar
          </button>
        </div>
      </dialog>
    </div>
  </body>
</html>
